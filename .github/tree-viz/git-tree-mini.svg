<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="300" height="600"
     viewBox="460 40 280 640">
  <style>
    @keyframes sway {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(3px); }
      50%  { transform: translateX(-2px); }
      75%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }
    .mini-node { animation: sway 4s ease-in-out infinite; }
    .mini-line { stroke-width: 1.5; fill: none; opacity: 0.5; }
  </style>
  <rect width="100%" height="100%" fill="#0a0a1a" rx="6"/>
  <g class="mini-node">
    <line class="mini-line" stroke="#4ade80" x1="600" y1="60" x2="600" y2="100"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="100" x2="600" y2="140"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="140" x2="600" y2="180"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="180" x2="600" y2="220"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="220" x2="600" y2="340"/>
    <path class="mini-line" stroke="#64748b" d="M 600 220 C 600 236, 720 244, 720 260"/>
    <path class="mini-line" stroke="#64748b" d="M 720 260 C 720 292, 600 308, 600 340"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="340" x2="600" y2="460"/>
    <path class="mini-line" stroke="#64748b" d="M 600 340 C 600 356, 480 364, 480 380"/>
    <path class="mini-line" stroke="#64748b" d="M 480 380 C 480 412, 600 428, 600 460"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="460" x2="600" y2="500"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="500" x2="600" y2="540"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="540" x2="600" y2="580"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="580" x2="600" y2="620"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="620" x2="600" y2="660"/>
    <circle cx="600" cy="60" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="100" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="140" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="180" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="220" r="7" fill="#c084fc" opacity="0.9"/>
    <circle cx="720" cy="260" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="340" r="7" fill="#c084fc" opacity="0.9"/>
    <circle cx="480" cy="380" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="460" r="6" fill="#fb923c" opacity="0.9"/>
    <circle cx="600" cy="500" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="540" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="580" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="620" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="660" r="4" fill="#4ade80" opacity="0.9"/>
